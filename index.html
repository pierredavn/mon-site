<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Site</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 60px auto;
      padding: 0 20px;
      background-color: #f5f5f5;
      color: #333;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 30px;
    }

    button {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 12px 28px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #357abd;
    }
  </style>
</head>
<body>
  <h1>Bienvenue sur mon site</h1>
  <p>
    Bonjour ! Je suis ravi de vous accueillir sur cette page.
    Ici, vous trouverez une présentation simple de mon projet.
    N'hésitez pas à explorer et à me contacter pour en savoir plus.
  </p>
  <button onclick="alert('Merci pour votre clic !')">En savoir plus</button>
</body>
</html>
